name: Deploy API (Azure Functions)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build_and_deploy_api:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install API dependencies
        working-directory: ./api
        run: npm ci

      - name: Build API
        working-directory: ./api
        run: npm run build --if-present

      - name: Zip API
        run: |
          cd api
          zip -r ../suivi-tabac-api-deploy.zip .

      - name: Azure Login
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy Function App
        uses: azure/functions-action@v1
        with:
          app-name: 'suivi-tabac-func-free'
          package: '../suivi-tabac-api-deploy.zip'
